name: SceneHub ESP-IDF CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scenehub-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IDF_VERSION: v5.3.3
  IDF_PATH: ${{ github.workspace }}/esp-idf

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.espressif
            ${{ env.IDF_PATH }}
          key: ${{ runner.os }}-espidf-${{ env.IDF_VERSION }}-${{ hashFiles('CMakeLists.txt', 'sdkconfig', 'dependencies.lock', 'components/**/CMakeLists.txt', 'scenehub_node_v1/esp_idf/CMakeLists.txt', 'scenehub_node_v1/esp_idf/sdkconfig', 'scenehub_node_v1/esp_idf/dependencies.lock', 'scenehub_node_v1/esp_idf/components/**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-espidf-${{ env.IDF_VERSION }}

      - name: Install ESP-IDF ${{ env.IDF_VERSION }}
        shell: bash
        run: |
          if [ ! -d "${IDF_PATH}" ]; then
            git clone --depth 1 --branch "${IDF_VERSION}" https://github.com/espressif/esp-idf.git "${IDF_PATH}"
          fi
          cd "${IDF_PATH}"
          ./install.sh esp32s3

      - name: Build firmware
        shell: bash
        run: |
          source "${IDF_PATH}/export.sh"
          idf.py build

      - name: Build SceneHub Node firmware
        shell: bash
        working-directory: scenehub_node_v1/esp_idf
        run: |
          source "${IDF_PATH}/export.sh"
          idf.py -DSDKCONFIG_DEFAULTS=sdkconfig.defaults.esp32s3 set-target esp32s3
          idf.py -DSDKCONFIG_DEFAULTS=sdkconfig.defaults.esp32s3 build

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenehub-firmware
          path: |
            build/*.bin
            build/*.elf
            build/*.map
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/flasher_args.json

      - name: Upload node build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenehub-node-firmware
          path: |
            scenehub_node_v1/esp_idf/build/*.bin
            scenehub_node_v1/esp_idf/build/*.elf
            scenehub_node_v1/esp_idf/build/*.map
            scenehub_node_v1/esp_idf/build/bootloader/bootloader.bin
            scenehub_node_v1/esp_idf/build/partition_table/partition-table.bin
            scenehub_node_v1/esp_idf/build/flasher_args.json
